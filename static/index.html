<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Nodi</title><style>body{font-family:sans-serif;margin:0;padding:20px;background:#eee}#auth,#chat{max-width:600px;margin:auto;background:white;padding:20px;border-radius:10px}input,button{margin:5px;padding:8px}#messages{height:400px;overflow:auto;border:1px solid #ccc;padding:10px}.msg{margin:5px}.my{text-align:right;color:blue}</style></head>
<body>
<div id="auth">
    <h2>Nodi</h2>
    <div id="step1">
        <input type="email" id="email" placeholder="Email"><br>
        <button onclick="sendCode()">Получить код</button>
    </div>
    <div id="step2" style="display:none">
        <input type="text" id="code" placeholder="Код из лога Render"><br>
        <input type="text" id="nick" placeholder="Никнейм"><br>
        <input type="password" id="pass" placeholder="Пароль"><br>
        <button onclick="register()">Зарегистрироваться</button>
        <button onclick="back()">Назад</button>
    </div>
    <hr>
    <div>
        <input type="email" id="loginEmail" placeholder="Email"><br>
        <input type="password" id="loginPass" placeholder="Пароль"><br>
        <button onclick="login()">Войти</button>
    </div>
    <div id="error" style="color:red"></div>
</div>
<div id="chat" style="display:none">
    <h3>Чат: <span id="myNick"></span> <button onclick="logout()">Выйти</button></h3>
    <input type="text" id="target" placeholder="Кому (никнейм)">
    <div id="messages"></div>
    <input type="text" id="msgInput" placeholder="Сообщение" style="width:70%"><button onclick="send()">Отправить</button>
</div>
<script>
let token=null, nick=null, ws=null, pendingEmail=null;
function showError(msg){document.getElementById('error').innerText=msg;setTimeout(()=>document.getElementById('error').innerText='',3000);}
async function sendCode(){
    let email=document.getElementById('email').value;
    if(!email)return showError('Введите email');
    pendingEmail=email;
    let fd=new FormData(); fd.append('email',email);
    let res=await fetch('/send_code',{method:'POST',body:fd});
    if(res.ok){
        document.getElementById('step1').style.display='none';
        document.getElementById('step2').style.display='block';
        showError('Код отправлен, найди его в логах Render');
    }else showError('Ошибка');
}
async function register(){
    let code=document.getElementById('code').value;
    let nickInput=document.getElementById('nick').value;
    let passInput=document.getElementById('pass').value;
    let fd=new FormData();
    fd.append('email',pendingEmail); fd.append('nick',nickInput); fd.append('password',passInput); fd.append('code',code);
    let res=await fetch('/register',{method:'POST',body:fd});
    let data=await res.json();
    if(res.ok){
        token=data.token; nick=data.nick;
        localStorage.setItem('token',token); localStorage.setItem('nick',nick);
        startChat();
    }else showError(data.detail);
}
async function login(){
    let email=document.getElementById('loginEmail').value;
    let pass=document.getElementById('loginPass').value;
    let fd=new FormData(); fd.append('email',email); fd.append('password',pass);
    let res=await fetch('/login',{method:'POST',body:fd});
    let data=await res.json();
    if(res.ok){
        token=data.token; nick=data.nick;
        localStorage.setItem('token',token); localStorage.setItem('nick',nick);
        startChat();
    }else showError(data.detail);
}
function startChat(){
    document.getElementById('auth').style.display='none';
    document.getElementById('chat').style.display='block';
    document.getElementById('myNick').innerText=nick;
    let proto=location.protocol==='https:'?'wss':'ws';
    ws=new WebSocket(`${proto}://${location.host}/ws/${token}`);
    ws.onmessage=e=>{
        let msg=JSON.parse(e.data);
        let div=document.createElement('div');
        div.className=`msg ${msg.from===nick?'my':'other'}`;
        div.innerHTML=`<b>${msg.from}</b> [${msg.time}]: ${msg.text}`;
        document.getElementById('messages').appendChild(div);
    };
}
function send(){
    let text=document.getElementById('msgInput').value;
    let to=document.getElementById('target').value;
    if(!text||!to)return;
    ws.send(JSON.stringify({to,text}));
    document.getElementById('msgInput').value='';
}
function logout(){localStorage.clear();if(ws)ws.close();location.reload();}
function back(){document.getElementById('step2').style.display='none';document.getElementById('step1').style.display='block';}
let savedToken=localStorage.getItem('token'), savedNick=localStorage.getItem('nick');
if(savedToken&&savedNick){token=savedToken;nick=savedNick;startChat();}
</script>
</body>
</html>
